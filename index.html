<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة تحكم الطلبة</title>
<style>
@font-face { font-family: 'TitelFont'; src: url('TITEL.ttf'); }
@font-face { font-family: 'WriteFont'; src: url('WRITE.otf'); }

body{
    margin:0;
    font-family:'WriteFont',sans-serif;
    overflow: hidden;
    position: relative;
    background: #000;
}

#bgVideo{
    position: fixed;
    right: 0;
    bottom: 0;
    min-width: 100%;
    min-height: 100%;
    width: auto;
    height: auto;
    z-index: -1;
    object-fit: cover;
}

.container{
    width:700px;
    margin:60px auto;
    background: rgba(255,255,255,0.85);
    padding:30px;
    border-radius:15px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.6);
    font-family:'WriteFont',sans-serif;
    backdrop-filter: blur(5px);
}

h2, h3{text-align:center;}

input{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border-radius:6px;
    border:1px solid rgba(0,0,0,0.3);
    font-family:'WriteFont',sans-serif;
    background: rgba(255,255,255,0.6);
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
}

button{
    width:48%;
    padding:12px;
    margin:5px 1%;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    font-family:'WriteFont',sans-serif;
    color:white;
    background: rgba(30,58,95,0.7);
    box-shadow: 0 6px 15px rgba(0,0,0,0.5);
    transition: all 0.2s ease-in-out;
}

button:hover{
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 10px 20px rgba(0,0,0,0.6);
}

button:active{
    transform: translateY(1px) scale(0.98);
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}

.color-palette{
    display:flex;
    justify-content:space-between;
    margin-top:5px;
}

.color-box{
    width:28px;
    height:28px;
    border-radius:4px;
    cursor:pointer;
    border:1px solid #000;
}

#msg{margin-top:10px; font-weight:bold; text-align:center; color:#222; text-shadow:1px 1px 4px rgba(255,255,255,0.7);}
table{width:100%; margin-top:20px; border-collapse:collapse;}
td,th{border:1px solid #ccc; padding:8px; text-align:center; background: rgba(255,255,255,0.6);}
</style>
</head>

<body>

<video autoplay muted loop id="bgVideo">
    <source src="V.mp4" type="video/mp4">
    متصفحك لا يدعم عرض الفيديو.
</video>

<div class="container">
<h2>إضافة / تعديل طالب</h2>

<input id="studentName" placeholder="اسم الطالب">
<input id="reportTitle" placeholder="عنوان التقرير">
<input id="subjectName" placeholder="المادة الدراسية">
<br>
<button onclick="addStudent()">➕ حفظ</button>
<button onclick="updateStudent()">✏ تعديل</button>

<hr>

<h3>تمييز الطالب</h3>
<input id="badgeIndex" placeholder="رقم الطالب">
<input id="badgeSymbol" placeholder="⭐ ضع شارة أو نص">
<button onclick="setBadge()">تمييز</button>

<hr>

<h3>تلوين الطالب</h3>
<input id="colorIndex" placeholder="رقم الطالب">
<div class="color-palette">
    <div class="color-box" style="background:red;" onclick="selectColor('red')"></div>
    <div class="color-box" style="background:blue;" onclick="selectColor('blue')"></div>
    <div class="color-box" style="background:green;" onclick="selectColor('green')"></div>
    <div class="color-box" style="background:orange;" onclick="selectColor('orange')"></div>
    <div class="color-box" style="background:purple;" onclick="selectColor('purple')"></div>
    <div class="color-box" style="background:pink;" onclick="selectColor('pink')"></div>
    <div class="color-box" style="background:yellow;" onclick="selectColor('yellow')"></div>
    <div class="color-box" style="background:brown;" onclick="selectColor('brown')"></div>
    <div class="color-box" style="background:cyan;" onclick="selectColor('cyan')"></div>
    <div class="color-box" style="background:gray;" onclick="selectColor('gray')"></div>
</div>
<button onclick="setColor()">تلوين</button>

<div id="msg"></div>

<h3>قائمة الطلبة</h3>

<table>
<thead>
<tr>
<th>#</th>
<th>الاسم</th>
<th>العنوان</th>
<th>المادة</th>
<th>التاريخ</th>
<th>تحكم</th>
</tr>
</thead>
<tbody id="studentsTable"></tbody>
</table>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const SUPABASE_URL="https://mcwemgjmqwbgxoyiwant.supabase.co"
const SUPABASE_KEY="sb_publishable_qmIUC4Rkb-VGOek8qkVqFg_Sn4x3WjI"
const supabase=createClient(SUPABASE_URL,SUPABASE_KEY)

let selectedID=null
let selectedColor=null
const msg=document.getElementById("msg")
let studentsData=[]

// اختيار اللون
function selectColor(color){ selectedColor=color; }

// ---------------- إضافة طالب ----------------
async function addStudent(){
    const name=document.getElementById("studentName").value.trim()
    const title=document.getElementById("reportTitle").value.trim()
    const subject=document.getElementById("subjectName").value.trim()
    if(!name||!title||!subject){ msg.innerHTML="املأ جميع الحقول"; return }

    const now=new Date().toISOString()
    const {error}=await supabase.from("student_reports").insert([{name,title,subject,date:now}])
    if(error){ msg.innerHTML="فشل الإضافة"; console.log(error); return }

    msg.innerHTML="تم إضافة الطالب 🎉"
    await loadStudents()
    clearInputs()
}

// ---------------- تعديل طالب ----------------
async function updateStudent(){
    if(!selectedID){ alert("اختر طالب للتعديل"); return }
    const name=document.getElementById("studentName").value.trim()
    const title=document.getElementById("reportTitle").value.trim()
    const subject=document.getElementById("subjectName").value.trim()
    if(!name||!title||!subject){ alert("املأ جميع الحقول"); return }

    const now=new Date().toISOString()
    const {error}=await supabase.from("student_reports").update({name,title,subject,date:now}).eq("id",selectedID)
    if(error){ alert("فشل التعديل"); console.log(error); return }

    alert("تم التعديل ✏")
    await loadStudents()
    clearInputs()
}

// ---------------- تحرير طالب ----------------
function editStudent(student){
    selectedID=student.id
    document.getElementById("studentName").value=student.name
    document.getElementById("reportTitle").value=student.title
    document.getElementById("subjectName").value=student.subject
}

// ---------------- حذف طالب ----------------
async function deleteStudent(id){
    if(!confirm("حذف الطالب؟")) return
    const {error}=await supabase.from("student_reports").delete().eq("id",id)
    if(error){ console.log(error); msg.innerHTML="فشل الحذف"; return }
    msg.innerHTML="تم حذف الطالب 🗑"
    await loadStudents()
}

// ---------------- تحميل الطلاب ----------------
async function loadStudents(){
    const {data,error}=await supabase.from("student_reports").select("*").order("id",{ascending:true})
    if(error){ console.log(error); msg.innerHTML="فشل تحميل الطلاب"; return }
    studentsData = data
    const table=document.getElementById("studentsTable")
    table.innerHTML=""
    data.forEach((s,i)=>{
        let displayName = s.name
        if(s.badge) displayName = `${s.badge} ${displayName}`
        table.innerHTML+=`
        <tr>
        <td>${i+1}</td>
        <td style="color:${s.color||'black'}">${displayName}</td>
        <td>${s.title}</td>
        <td>${s.subject}</td>
        <td>${new Date(s.date).toLocaleString()}</td>
        <td>
        <button onclick='editStudent(${JSON.stringify(s)})'>تعديل</button>
        <button onclick='deleteStudent(${s.id})'>حذف</button>
        </td>
        </tr>
        `
    })
}

// ---------------- مسح الحقول ----------------
function clearInputs(){
    document.getElementById("studentName").value=""
    document.getElementById("reportTitle").value=""
    document.getElementById("subjectName").value=""
    document.getElementById("badgeIndex").value=""
    document.getElementById("badgeSymbol").value=""
    document.getElementById("colorIndex").value=""
    selectedID=null
}

// ---------------- تمييز الطلاب ----------------
async function setBadge(){
    const idx=parseInt(document.getElementById("badgeIndex").value)-1
    const symbol=document.getElementById("badgeSymbol").value.trim()
    if(isNaN(idx) || !symbol){ msg.innerHTML="ادخل رقم الطالب والشارة"; return }
    if(idx<0 || idx>=studentsData.length){ msg.innerHTML="رقم الطالب غير صحيح"; return }

    const studentID=studentsData[idx].id
    const {error}=await supabase.from("student_reports").update({badge:symbol}).eq("id",studentID)
    if(error){ console.log(error); msg.innerHTML="فشل تمييز الطالب"; return }

    studentsData[idx].badge = symbol
    await loadStudents()
    msg.innerHTML="تم تمييز الطالب 🎉"
    clearInputs()
}

// ---------------- تلوين الطلاب ----------------
async function setColor(){
    const idx=parseInt(document.getElementById("colorIndex").value)-1
    if(isNaN(idx)){ msg.innerHTML="ادخل رقم الطالب"; return }
    if(!selectedColor){ msg.innerHTML="اختر لون"; return }
    if(idx<0 || idx>=studentsData.length){ msg.innerHTML="رقم الطالب غير صحيح"; return }

    const studentID=studentsData[idx].id
    const {error}=await supabase.from("student_reports").update({color:selectedColor}).eq("id",studentID)
    if(error){ console.log(error); msg.innerHTML="فشل التلوين"; return }

    studentsData[idx].color = selectedColor
    await loadStudents()
    msg.innerHTML="تم تلوين الطالب 🎨"
    clearInputs()
}

// ---------------- Realtime ----------------
supabase.channel("students_channel")
.on("postgres_changes",{event:"*",schema:"public",table:"student_reports"},payload=>{
    loadStudents()
})
.subscribe()

window.addStudent=addStudent
window.updateStudent=updateStudent
window.deleteStudent=deleteStudent
window.editStudent=editStudent
window.setBadge=setBadge
window.selectColor=selectColor
window.setColor=setColor

loadStudents()
</script>
</body>
</html>
