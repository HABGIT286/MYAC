<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>عناوين تقارير الطلبة</title>

<style>
@font-face { font-family: 'TitelFont'; src: url('TITEL.ttf'); }
@font-face { font-family: 'WriteFont'; src: url('WRITE.otf'); }

body{
margin:0;
font-family:'WriteFont',sans-serif;
overflow:hidden;
position:relative;
background:#000;
}

#bgVideo{
position:fixed;
right:0;
bottom:0;
min-width:100%;
min-height:100%;
z-index:-1;
object-fit:cover;
}

.header{
text-align:center;
font-size:32px;
font-weight:bold;
padding:20px;
background:rgba(30,58,95,0.8);
color:white;
font-family:'TitelFont';
}

.container{
width:650px;
margin:80px auto;
background:rgba(255,255,255,0.8);
padding:30px;
border-radius:15px;
box-shadow:0 8px 25px rgba(0,0,0,0.6);
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:6px;
border:1px solid rgba(0,0,0,0.3);
}

button{
width:100%;
padding:14px;
margin-bottom:12px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
color:white;
background:rgba(30,58,95,0.7);
}

.save{background:rgba(30,58,95,0.8);}
.change{background:rgba(179,139,0,0.8);}
.info{background:rgba(0,107,56,0.8);}
.show{background:rgba(139,0,0,0.8);}
.delete{background:rgba(170,0,0,0.8);}

#infoBox,#allTitles{
margin-top:20px;
padding:15px;
background:rgba(240,240,240,0.7);
border-radius:10px;
max-height:350px;
overflow-y:auto;
}

.highlight{
background:rgba(255,255,0,0.3);
}
</style>
</head>

<body>

<video autoplay muted loop id="bgVideo">
<source src="V.mp4" type="video/mp4">
</video>

<div class="header">عناوين تقارير الطلبة</div>

<div class="container">

<input id="studentName" placeholder="اسم الطالب الثنائي">
<input id="reportTitle" placeholder="عنوان التقرير">
<input id="subjectName" placeholder="المادة الدراسية">

<button class="save" onclick="saveData()">حفظ</button>
<button class="change" onclick="changeTitle()">تغيير عنوان التقرير</button>
<button class="info" onclick="showMyInfo()">معلوماتي</button>
<button class="show" onclick="showAll()">عناوين الطلبة</button>
<button class="delete" onclick="deleteMyData()">حذف معلوماتي</button>

<div id="msg"></div>
<div id="infoBox"></div>
<div id="allTitles"></div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const SUPABASE_URL="https://mcwemgjmqwbgxoyiwant.supabase.co"
const SUPABASE_KEY="sb_publishable_qmIUC4Rkb-VGOek8qkVqFg_Sn4x3WjI"

const supabase=createClient(SUPABASE_URL,SUPABASE_KEY)

function formatDate(ts){
if(!ts)return""
const d=new Date(ts)
return d.toLocaleString()
}

function generateCode(){
return Math.floor(1000+Math.random()*9000).toString()
}

async function saveData(){

const name=document.getElementById("studentName").value.trim()
const title=document.getElementById("reportTitle").value.trim()
const subject=document.getElementById("subjectName").value.trim()
const msg=document.getElementById("msg")

if(name.split(/\s+/).length<2){
msg.innerHTML="الاسم يجب أن يكون ثنائي"
return
}

if(!name||!title||!subject){
msg.innerHTML="املأ جميع الحقول"
return
}

let code=localStorage.getItem("studentCode")

if(!code){

let unique=false

while(!unique){

code=generateCode()

const {data}=await supabase
.from("student_reports")
.select("*")
.eq("code",code)

if(!data||data.length===0)unique=true

}

localStorage.setItem("studentCode",code)

}

const now=new Date().toISOString()

const {error}=await supabase
.from("student_reports")
.insert([{name,title,subject,data:now,code}])

if(error){
msg.innerHTML="فشل الحفظ"
console.log(error)
return
}

msg.innerHTML="تم حفظ البيانات"

showMyInfo()
showAll()

}

async function changeTitle(){

const code=localStorage.getItem("studentCode")
const msg=document.getElementById("msg")

if(!code){
msg.innerHTML="ادخل بياناتك أولاً"
return
}

const newTitle=prompt("ادخل العنوان الجديد")

if(!newTitle)return

const now=new Date().toISOString()

const {error}=await supabase
.from("student_reports")
.update({title:newTitle,data:now})
.eq("code",code)

if(error){
msg.innerHTML="فشل التحديث"
console.log(error)
return
}

msg.innerHTML="تم تغيير العنوان"

showMyInfo()
showAll()

}

async function showMyInfo(){

const code=localStorage.getItem("studentCode")
const infoBox=document.getElementById("infoBox")

if(!code){
infoBox.innerHTML=""
return
}

const {data}=await supabase
.from("student_reports")
.select("*")
.eq("code",code)
.single()

if(!data){
infoBox.innerHTML=""
return
}

infoBox.innerHTML=`
<h4>معلومات الطالب</h4>
<p><b>الاسم:</b> ${data.name}</p>
<p><b>العنوان:</b> ${data.title}</p>
<p><b>المادة:</b> ${data.subject}</p>
<p><b>التاريخ:</b> ${formatDate(data.data)}</p>
`

}

async function showAll(){

const {data,error}=await supabase
.from("student_reports")
.select("*")
.order("id",{ascending:true})

const container=document.getElementById("allTitles")

if(error){
container.innerHTML="فشل تحميل البيانات"
return
}

let html="<h3>جميع العناوين</h3><ul>"

const code=localStorage.getItem("studentCode")

data.forEach((d,i)=>{

const highlight=d.code===code?"highlight":""

html+=`
<li class="${highlight}">
${i+1}. ${d.name} | ${d.title} | ${d.subject} | ${formatDate(d.data)}
</li>
`

})

html+="</ul>"

container.innerHTML=html

}

async function deleteMyData(){

const code=localStorage.getItem("studentCode")
const msg=document.getElementById("msg")

if(!code){
msg.innerHTML="لم يتم إدخال بياناتك"
return
}

const {error}=await supabase
.from("student_reports")
.delete()
.eq("code",code)

if(error){
msg.innerHTML="فشل الحذف"
console.log(error)
return
}

msg.innerHTML="تم حذف بياناتك"

localStorage.removeItem("studentCode")

showAll()

}

/* 🔴 التحديث الفوري Realtime */

supabase
.channel("student_reports_channel")
.on(
"postgres_changes",
{event:"*",schema:"public",table:"student_reports"},
payload=>{
showAll()
showMyInfo()
}
)
.subscribe()

window.saveData=saveData
window.changeTitle=changeTitle
window.showMyInfo=showMyInfo
window.showAll=showAll
window.deleteMyData=deleteMyData

showAll()

</script>

</body>
</html>
