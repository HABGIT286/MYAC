<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة تحكم Admin</title>
<style>
@font-face { font-family: 'TitelFont'; src: url('TITEL.ttf'); }
@font-face { font-family: 'WriteFont'; src: url('WRITE.otf'); }

body{
    margin:0;
    font-family:'WriteFont',sans-serif;
    overflow: hidden;
    position: relative;
    background: #000;
    color:white;
    text-align:center;
}

#bgVideo{
    position: fixed;
    right: 0;
    bottom: 0;
    min-width: 100%;
    min-height: 100%;
    width: auto;
    height: auto;
    z-index: -1;
    object-fit: cover;
}

.container{
    width:700px;
    margin:50px auto;
    background: rgba(30,58,95,0.6);
    padding:30px;
    border-radius:15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
}

h1{
    font-family:'TitelFont';
    font-size:40px;
    margin-bottom:20px;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
}

button{
    width:80%;
    padding:14px;
    margin:12px auto;
    border:none;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
    display:block;
    color:white;
    background: rgba(40,100,160,0.6);
    box-shadow: 0 6px 12px rgba(0,0,0,0.5);
    transition: all 0.2s ease-in-out;
    perspective: 1000px;
    font-family:'WriteFont';
}

button:hover{
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 10px 20px rgba(0,0,0,0.7);
}

button:active{
    transform: translateY(2px) scale(0.98);
    box-shadow: 0 4px 10px rgba(0,0,0,0.6);
}

input{
    width:70%;
    padding:12px;
    margin:10px auto;
    border-radius:8px;
    border:1px solid rgba(255,255,255,0.4);
    display:block;
    text-align:center;
    background: rgba(255,255,255,0.15);
    color:white;
    font-family:'WriteFont';
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.3);
}

#msg{
    margin-top:15px;
    font-weight:bold;
    color:#ffdd57;
}

#studentTable{
    margin-top:20px;
    width:100%;
    border-collapse: collapse;
    background: rgba(255,255,255,0.1);
    color:white;
    text-align:center;
}

#studentTable th, #studentTable td{
    border: 1px solid rgba(255,255,255,0.3);
    padding:8px;
}

#studentTable th{
    background: rgba(40,80,150,0.7);
}

.editInputs{display:none;margin-top:10px;}
</style>
</head>
<body>

<video autoplay muted loop id="bgVideo">
    <source src="V.mp4" type="video/mp4">
    متصفحك لا يدعم عرض الفيديو.
</video>

<div class="container">
<h1>ONYX Admin Panel</h1>

<!-- إضافة طالب -->
<button id="showAddFormBtn" onclick="showAddForm()">➕ إضافة طالب</button>
<div id="addForm" style="display:none">
    <input type="text" id="newName" placeholder="اسم الطالب">
    <input type="text" id="newTitle" placeholder="عنوان التقرير">
    <input type="text" id="newSubject" placeholder="المادة">
    <button onclick="addStudent()">💾 حفظ</button>
</div>

<!-- حذف طالب -->
<input type="number" id="deleteStudentId" placeholder="ادخل رقم الطالب">
<button onclick="deleteStudent()">🗑️ حذف طالب</button>

<div id="msg"></div>

<table id="studentTable">
<thead>
<tr>
    <th>رقم</th>
    <th>الاسم</th>
    <th>عنوان التقرير</th>
    <th>المادة</th>
    <th>تاريخ الإضافة</th>
    <th>تحكم</th>
</tr>
</thead>
<tbody>
<!-- سيتم ملء الجدول هنا -->
</tbody>
</table>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const SUPABASE_URL = "https://mcwemgjmqwbgxoyiwant.supabase.co"
const SUPABASE_KEY = "sb_publishable_qmIUC4Rkb-VGOek8qkVqFg_Sn4x3WjI"
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

const showAddFormBtn = document.getElementById('showAddFormBtn')
const addForm = document.getElementById('addForm')
const msg = document.getElementById('msg')
const tbody = document.querySelector('#studentTable tbody')

// --- اظهار/اخفاء نموذج الإضافة ---
function showAddForm(){
    addForm.style.display = addForm.style.display==='none'?'block':'none';
}

// --- إضافة طالب وحفظه في Supabase ---
async function addStudent(){
    const name = document.getElementById('newName').value.trim()
    const title = document.getElementById('newTitle').value.trim()
    const subject = document.getElementById('newSubject').value.trim()

    if(!name || !title || !subject){
        msg.innerText = "⚠️ املأ كل الحقول"
        return
    }

    const {data,error} = await supabase
        .from('student_reports')
        .insert([{name,title,subject}])
        .select() // للحصول على السطر المضاف
    if(error){ 
        msg.innerText = "❌ فشل إضافة الطالب"
        console.log(error)
        return
    }

    msg.innerText = `✔️ تم إضافة الطالب: ${name}`
    document.getElementById('newName').value = ''
    document.getElementById('newTitle').value = ''
    document.getElementById('newSubject').value = ''
    addForm.style.display='none'
}

// --- حذف طالب ---
async function deleteStudent(){
    const id = parseInt(document.getElementById('deleteStudentId').value)
    if(!id){ msg.innerText="⚠️ أدخل رقم صحيح"; return }

    const {error} = await supabase.from('student_reports').delete().eq('id',id)
    if(error){ msg.innerText="❌ خطأ في الحذف"; console.log(error); return }

    msg.innerText = `✅ تم حذف الطالب: ${id}`
}

// --- تعديل وحفظ بيانات طالب موجود ---
async function saveEdit(id){
    const name = document.getElementById(`editName-${id}`).value.trim()
    const title = document.getElementById(`editTitle-${id}`).value.trim()
    const subject = document.getElementById(`editSubject-${id}`).value.trim()
    if(!name || !title || !subject){ msg.innerText="⚠️ املأ كل الحقول"; return }

    const {error} = await supabase.from('student_reports').update({name,title,subject}).eq('id',id)
    if(error){ msg.innerText="❌ خطأ في التعديل"; console.log(error); return }
    msg.innerText = `✔️ تم تعديل بيانات الطالب: ${name}`
}

// --- اظهار/اخفاء نموذج التعديل ---
function toggleEdit(id){
    const div = document.getElementById(`edit-${id}`)
    div.style.display = div.style.display==='none'?'block':'none'
}

// --- عرض جميع الطلاب مباشرة ---
async function showAll(){
    const {data,error} = await supabase.from('student_reports').select("*").order('id',{ascending:true})
    if(error){ console.log(error); return }

    tbody.innerHTML = ''
    data.forEach((d,index)=>{
        const tr = document.createElement('tr')
        tr.innerHTML = `
            <td>${index+1}</td>
            <td>${d.name}</td>
            <td>${d.title}</td>
            <td>${d.subject}</td>
            <td>${new Date(d.created_at).toLocaleString()}</td>
            <td>
                <button onclick="toggleEdit(${d.id})">✏️ تعديل</button>
                <div class="editInputs" id="edit-${d.id}">
                    <input id="editName-${d.id}" value="${d.name}" placeholder="الاسم">
                    <input id="editTitle-${d.id}" value="${d.title}" placeholder="عنوان التقرير">
                    <input id="editSubject-${d.id}" value="${d.subject}" placeholder="المادة">
                    <button onclick="saveEdit(${d.id})">💾 حفظ</button>
                </div>
            </td>
        `
        tbody.appendChild(tr)
    })
}

// --- Realtime لجميع التغييرات ---
supabase
  .channel('public:student_reports')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'student_reports' }, payload=>{
      showAll()
  })
  .subscribe()

// --- البداية ---
showAll()
</script>

</body>
</html>
