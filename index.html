<!doctype html>
<html lang="ar">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SWEET-BOY-KNDER</title>

<style>
/* ---- Fonts ---- */
@font-face{
  font-family:'WelFont';
  src:url('wel.ttf') format('truetype');
}
@font-face{
  font-family:'RealRound';
  src:url('REALROUND.otf') format('opentype');
}

/* ---- Reset ---- */
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:#000;color:#fff;font-family:'WelFont',sans-serif;}

/* ---- Background video ---- */
#bg-video{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
  filter:brightness(0.6);
}

/* ---- Container in center ---- */
.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:90%;
  max-width:600px;
  padding:40px 30px;
  border-radius:20px;
  background:rgba(0,0,0,0.4);
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  backdrop-filter: blur(6px);
}

/* ---- Title ---- */
h1.title{
  font-family:'WelFont', sans-serif;
  font-size:42px;
  font-weight:900;
  color:#ff1493;
  letter-spacing:1.5px;
  margin-bottom:15px;
  text-shadow:0 0 10px #ff69b4, 0 0 20px #ff1493;
  transition:0.3s all ease;
}
h1.title:hover{
  transform:scale(1.05);
  text-shadow:0 0 15px #ff69b4, 0 0 30px #ff1493, 0 0 50px #ff69b4;
}

/* ---- Welcome text ---- */
p.welcome-text{
  font-family:'RealRound', serif;
  font-weight:700;
  font-size:20px;
  color:#fff;
  margin-bottom:30px;
  line-height:1.5;
}

/* ---- Social Grid ---- */
.circle-grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}
.social-btn{
  width:80px;
  height:80px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(145deg,#8B4513,#A0522D);
  border:2px solid #5C3317;
  box-shadow:4px 4px 10px rgba(0,0,0,0.5),-4px -4px 10px rgba(255,255,255,0.1);
  transition: transform .2s ease, box-shadow .2s ease;
}
.social-btn:hover{
  transform:translateY(-5px) scale(1.1);
  box-shadow:6px 6px 15px rgba(0,0,0,0.6),-6px -6px 15px rgba(255,255,255,0.15);
}
.social-btn img{
  width:40px;
  height:40px;
  border-radius:6px;
}

/* ---- Responsive ---- */
@media(max-width:768px){
  h1.title{font-size:32px;}
  p.welcome-text{font-size:18px;}
  .social-btn{width:70px;height:70px;}
}
</style>
</head>
<body>

<!-- Background video -->
<video id="bg-video" autoplay muted loop>
  <source src="V.mp4" type="video/mp4">
</video>

<!-- Container -->
<div class="container">
  <h1 class="title">SWEET-BOY-KNDER</h1>
  <p class="welcome-text">أتمنى أن تستمتع بعالمك 🥛🍰🍬</p>

  <div class="circle-grid">
    <a href="https://www.instagram.com/__4if" target="_blank" class="social-btn"><img src="I.svg" alt="Instagram"></a>
    <a href="https://www.tiktok.com/@" target="_blank" class="social-btn"><img src="T.svg" alt="TikTok"></a>
    <a href="https://www.facebook.com/" target="_blank" class="social-btn"><img src="F.svg" alt="Facebook"></a>
    <a href="https://wa.me/" target="_blank" class="social-btn"><img src="W.svg" alt="WhatsApp"></a>
  </div>
</div>

</body>
</html>
