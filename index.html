<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة تحكم Admin</title>
<style>
@font-face { font-family: 'TitelFont'; src: url('TITEL.ttf'); }
@font-face { font-family: 'WriteFont'; src: url('WRITE.otf'); }

body{
    margin:0;
    font-family:'WriteFont',sans-serif;
    overflow: hidden;
    position: relative;
    background: #000;
    color:white;
    text-align:center;
}

#bgVideo{
    position: fixed;
    right: 0;
    bottom: 0;
    min-width: 100%;
    min-height: 100%;
    width: auto;
    height: auto;
    z-index: -1;
    object-fit: cover;
}

.container{
    width:500px;
    margin:50px auto;
    background: rgba(30,58,95,0.6);
    padding:30px;
    border-radius:15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
}

h1{
    font-family:'TitelFont';
    font-size:40px;
    margin-bottom:20px;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
}

button{
    width:80%;
    padding:14px;
    margin:12px auto;
    border:none;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
    display:block;
    color:white;
    background: rgba(40,100,160,0.6);
    box-shadow: 0 6px 12px rgba(0,0,0,0.5);
    transition: all 0.2s ease-in-out;
    perspective: 1000px;
    font-family:'WriteFont';
}

button:hover{
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 10px 20px rgba(0,0,0,0.7);
}

button:active{
    transform: translateY(2px) scale(0.98);
    box-shadow: 0 4px 10px rgba(0,0,0,0.6);
}

input{
    width:70%;
    padding:12px;
    margin:10px auto;
    border-radius:8px;
    border:1px solid rgba(255,255,255,0.4);
    display:block;
    text-align:center;
    background: rgba(255,255,255,0.15);
    color:white;
    font-family:'WriteFont';
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.3);
}

#msg{
    margin-top:15px;
    font-weight:bold;
    color:#ffdd57;
}

#allTitles{
    margin-top:20px;
    max-height:350px;
    overflow-y:auto;
    text-align:right;
    background: rgba(255,255,255,0.1);
    padding:10px;
    border-radius:10px;
    font-family:'WriteFont';
}

#allTitles ul{list-style:none;padding:0;margin:0;}
#allTitles li{
    padding:8px 10px;
    border-bottom:1px solid rgba(255,255,255,0.2);
}
</style>
</head>
<body>

<video autoplay muted loop id="bgVideo">
    <source src="V.mp4" type="video/mp4">
    متصفحك لا يدعم عرض الفيديو.
</video>

<div class="container">
    <h1>ONYX</h1>

    <!-- زر عرض عناوين الطلاب -->
    <button onclick="showAll()">📋 عناوين الطلاب</button>
    
    <!-- حذف طالب -->
    <input type="number" id="deleteStudentId" placeholder="ادخل رقم الطالب">
    <button onclick="deleteStudent()">🗑️ حذف طالب</button>

    <!-- ايقاف اضافة عمود -->
    <button onclick="disableAddColumn()" style="background:rgba(180,80,0,0.7)">⛔ ايقاف اضافة عمود</button>
    
    <!-- قفل وفتح الموقع -->
    <button onclick="lockSite()" style="background:rgba(200,0,0,0.7)">🔒 قفل الموقع</button>
    <button onclick="unlockSite()" style="background:rgba(0,150,0,0.7)">🔓 فتح الموقع</button>

    <div id="msg"></div>
    <div id="allTitles"></div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const SUPABASE_URL = "https://mcwemgjmqwbgxoyiwant.supabase.co"
const SUPABASE_KEY = "sb_publishable_qmIUC4Rkb-VGOek8qkVqFg_Sn4x3WjI"
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

// --- عرض جميع الطلاب ---
async function showAll(){
    const {data,error} = await supabase.from("student_reports").select("*").order("id",{ascending:true})
    const container = document.getElementById("allTitles")
    if(error){ container.innerHTML="❌ فشل تحميل البيانات"; console.log(error); return }
    let html = "<h3>📄 جميع عناوين الطلاب</h3><ul>"
    data.forEach((d)=>{
        html+=`<li>${d.id}. ${d.name} | ${d.title} | ${d.subject}</li>`
    })
    html+="</ul>"
    container.innerHTML = html
}

// --- حذف طالب ---
async function deleteStudent(){
    const id = parseInt(document.getElementById("deleteStudentId").value)
    const msg = document.getElementById("msg")
    if(!id){ msg.innerHTML="⚠️ أدخل رقم صحيح"; return }

    const {data,error} = await supabase.from("student_reports").select("*").eq("id",id)
    if(error || !data || data.length===0){ msg.innerHTML="⚠️ رقم الطالب غير موجود"; return }

    await supabase.from("student_reports").delete().eq("id",id)
    msg.innerHTML=`✅ تم حذف بيانات الطالب: ${data[0].name}`
    await showAll()
}

// --- ايقاف اضافة عمود ---
async function disableAddColumn(){
    const {error} = await supabase.from("site_control").update({add_disabled:true}).eq("id",1)
    const msg = document.getElementById("msg")
    if(error){ msg.innerHTML="❌ فشل ايقاف اضافة العمود"; console.log(error); return }
    msg.innerHTML="⛔ تم ايقاف اضافة الاعمدة"
}

// --- قفل الموقع ---
async function lockSite(){
    const {error} = await supabase.from("site_control").update({locked:true}).eq("id",1)
    const msg = document.getElementById("msg")
    if(error){ msg.innerHTML="❌ فشل قفل الموقع"; console.log(error); return }
    msg.innerHTML="🔒 تم قفل الموقع"
}

// --- فتح الموقع ---
async function unlockSite(){
    const {error} = await supabase.from("site_control").update({locked:false}).eq("id",1)
    const msg = document.getElementById("msg")
    if(error){ msg.innerHTML="❌ فشل فتح الموقع"; console.log(error); return }
    msg.innerHTML="🔓 تم فتح الموقع"
}

// --- تصدير الدوال ---
window.showAll = showAll
window.deleteStudent = deleteStudent
window.disableAddColumn = disableAddColumn
window.lockSite = lockSite
window.unlockSite = unlockSite
</script>

</body>
</html>
