<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>لوحة تحكم الطلبة</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
}

.container{
width:600px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
width:90%;
padding:10px;
margin:8px;
}

button{
padding:10px 20px;
margin:5px;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

td,th{
border:1px solid #ccc;
padding:8px;
}

</style>

</head>

<body>

<div class="container">

<h2>إضافة / تعديل طالب</h2>

<input id="studentName" placeholder="اسم الطالب">
<input id="reportTitle" placeholder="عنوان التقرير">
<input id="subjectName" placeholder="المادة الدراسية">

<br>

<button onclick="addStudent()">➕ حفظ</button>
<button onclick="updateStudent()">✏ تعديل</button>

<div id="msg"></div>

<h3>قائمة الطلبة</h3>

<table>

<thead>
<tr>
<th>#</th>
<th>الاسم</th>
<th>العنوان</th>
<th>المادة</th>
<th>التاريخ</th>
<th>تحكم</th>
</tr>
</thead>

<tbody id="studentsTable"></tbody>

</table>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const SUPABASE_URL="https://mcwemgjmqwbgxoyiwant.supabase.co"
const SUPABASE_KEY="sb_publishable_qmIUC4Rkb-VGOek8qkVqFg_Sn4x3WjI"

const supabase=createClient(SUPABASE_URL,SUPABASE_KEY)

let selectedID=null

async function addStudent(){

const name=document.getElementById("studentName").value.trim()
const title=document.getElementById("reportTitle").value.trim()
const subject=document.getElementById("subjectName").value.trim()

const msg=document.getElementById("msg")

if(!name||!title||!subject){

msg.innerHTML="املأ جميع الحقول"
return

}

const now=new Date().toISOString()

const {error}=await supabase
.from("student_reports")
.insert([{name,title,subject,data:now}])

if(error){

msg.innerHTML="فشل الإضافة"
console.log(error)
return

}

msg.innerHTML="تم إضافة الطالب"

clearInputs()

}

async function updateStudent(){

if(!selectedID){

alert("اختر طالب للتعديل")
return

}

const name=document.getElementById("studentName").value
const title=document.getElementById("reportTitle").value
const subject=document.getElementById("subjectName").value

const now=new Date().toISOString()

const {error}=await supabase
.from("student_reports")
.update({name,title,subject,data:now})
.eq("id",selectedID)

if(error){

alert("فشل التعديل")
console.log(error)
return

}

alert("تم التعديل")

clearInputs()

}

function editStudent(student){

selectedID=student.id

document.getElementById("studentName").value=student.name
document.getElementById("reportTitle").value=student.title
document.getElementById("subjectName").value=student.subject

}

async function deleteStudent(id){

if(!confirm("حذف الطالب؟"))return

const {error}=await supabase
.from("student_reports")
.delete()
.eq("id",id)

if(error){

alert("فشل الحذف")
console.log(error)

}

}

async function loadStudents(){

const {data,error}=await supabase
.from("student_reports")
.select("*")
.order("id",{ascending:true})

const table=document.getElementById("studentsTable")

table.innerHTML=""

data.forEach((s,i)=>{

table.innerHTML+=`

<tr>

<td>${i+1}</td>
<td>${s.name}</td>
<td>${s.title}</td>
<td>${s.subject}</td>
<td>${new Date(s.data).toLocaleString()}</td>

<td>

<button onclick='editStudent(${JSON.stringify(s)})'>تعديل</button>
<button onclick='deleteStudent(${s.id})'>حذف</button>

</td>

</tr>

`

})

}

function clearInputs(){

document.getElementById("studentName").value=""
document.getElementById("reportTitle").value=""
document.getElementById("subjectName").value=""

selectedID=null

}

supabase
.channel("students_channel")
.on("postgres_changes",{event:"*",schema:"public",table:"student_reports"},payload=>{

loadStudents()

})
.subscribe()

window.addStudent=addStudent
window.updateStudent=updateStudent
window.deleteStudent=deleteStudent
window.editStudent=editStudent

loadStudents()

</script>

</body>
</html>
