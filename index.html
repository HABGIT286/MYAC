<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة تحكم Admin</title>
<style>
@font-face { font-family: 'TitelFont'; src: url('TITEL.ttf'); }
body{
    margin:0;
    font-family:'TitelFont',sans-serif;
    background:#000;
    color:white;
    text-align:center;
}

.container{
    width:500px;
    margin:50px auto;
    background: rgba(30,58,95,0.85);
    padding:30px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.7);
}

button{
    width:80%;
    padding:12px;
    margin:10px auto;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    display:block;
    color:white;
    background: rgba(179,139,0,0.8);
}

button:hover{
    transform: scale(1.03);
    transition: all 0.2s ease-in-out;
}

input{
    width:70%;
    padding:10px;
    margin:10px auto;
    border-radius:6px;
    border:none;
    display:block;
    text-align:center;
}

#msg{
    margin-top:15px;
    font-weight:bold;
    color:#ffdd57;
}
</style>
</head>
<body>

<div class="container">
    <h2>لوحة التحكم Admin</h2>

    <!-- زر عرض عناوين الطلاب -->
    <button onclick="showAll()">📋 عناوين الطلاب</button>
    
    <!-- حذف طالب -->
    <input type="number" id="deleteStudentId" placeholder="ادخل رقم الطالب">
    <button onclick="deleteStudent()">🗑️ حذف طالب</button>
    
    <!-- قفل وفتح الموقع -->
    <button onclick="lockSite()" style="background:rgba(200,0,0,0.8)">🔒 قفل الموقع</button>
    <button onclick="unlockSite()" style="background:rgba(0,150,0,0.8)">🔓 فتح الموقع</button>

    <div id="msg"></div>
    <div id="allTitles"></div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const SUPABASE_URL = "https://mcwemgjmqwbgxoyiwant.supabase.co"
const SUPABASE_KEY = "sb_publishable_qmIUC4Rkb-VGOek8qkVqFg_Sn4x3WjI"
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

// --- عرض جميع الطلاب ---
async function showAll(){
    const {data,error} = await supabase.from("student_reports").select("*").order("id",{ascending:true})
    const container = document.getElementById("allTitles")
    if(error){ container.innerHTML="❌ فشل تحميل البيانات"; console.log(error); return }
    let html = "<h3>📄 جميع عناوين الطلاب</h3><ul style='list-style:none;padding:0;'>"
    data.forEach((d)=>{
        html+=`<li>${d.id}. ${d.name} | ${d.title} | ${d.subject}</li>`
    })
    html+="</ul>"
    container.innerHTML = html
}

// --- حذف طالب برقم ---
async function deleteStudent(){
    const id = parseInt(document.getElementById("deleteStudentId").value)
    const msg = document.getElementById("msg")
    if(!id){ msg.innerHTML="⚠️ أدخل رقم صحيح"; return }

    const {data,error} = await supabase.from("student_reports").select("*").eq("id",id)
    if(error || !data || data.length===0){ msg.innerHTML="⚠️ رقم الطالب غير موجود"; return }

    await supabase.from("student_reports").delete().eq("id",id)
    msg.innerHTML=`✅ تم حذف بيانات الطالب: ${data[0].name}`
    await showAll()
}

// --- قفل الموقع ---
async function lockSite(){
    const {error} = await supabase.from("site_control").update({site_enabled:false}).eq("id",1)
    const msg = document.getElementById("msg")
    if(error){ msg.innerHTML="❌ فشل قفل الموقع"; console.log(error); return }
    msg.innerHTML="🔒 تم قفل الموقع"
}

// --- فتح الموقع ---
async function unlockSite(){
    const {error} = await supabase.from("site_control").update({site_enabled:true}).eq("id",1)
    const msg = document.getElementById("msg")
    if(error){ msg.innerHTML="❌ فشل فتح الموقع"; console.log(error); return }
    msg.innerHTML="🔓 تم فتح الموقع"
}

// --- تصدير الدوال عالمياً ---
window.showAll = showAll
window.deleteStudent = deleteStudent
window.lockSite = lockSite
window.unlockSite = unlockSite
</script>

</body>
</html>
